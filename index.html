<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />

    <!-- ================= SEO START ================= -->

    <!-- Title -->
    <title>Blackpotheads - Psy Clothing | Premium Streetwear Brand</title>

    <!-- Meta -->
    <meta name="title" content="Blackpotheads - Psy Clothing | Premium Streetwear Brand" />
    <meta name="description" content="Buy psychedelic t-shirts & streetwear in India. Shop unique Shiva, gothic & trippy printed tees at Blackpotheads (Black Potheads). Premium quality. Free shipping, COD & easy returns." />

    <!-- Keywords -->
    <meta name="keywords" content="blackpotheads, black potheads, psy clothing india, psychedelic t-shirts india, streetwear india, Trippy streetwear, Psychedelic streetwear, graphic tees india, shiva t-shirts, gothic clothing india, trippy t-shirts, premium streetwear brand india" />

    <!-- Author -->
    <meta name="author" content="Blackpotheads" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://blackpotheads.com/" />

    <!-- ================= OPEN GRAPH ================= -->

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://blackpotheads.com/" />
    <meta property="og:site_name" content="Blackpotheads" />
    <meta property="og:title" content="Blackpotheads - Psy Clothing | Premium Streetwear Brand" />
    <meta property="og:description" content="Buy psychedelic t-shirts & streetwear in India. Shop unique Shiva, gothic & trippy printed tees at Blackpotheads." />
    <meta property="og:image" content="https://blackpotheads.com/logo.png" />

    <!-- ================= TWITTER ================= -->

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Blackpotheads - Psy Clothing | Premium Streetwear Brand" />
    <meta name="twitter:description" content="Buy psychedelic t-shirts & streetwear in India. Premium quality streetwear brand." />
    <meta name="twitter:image" content="https://blackpotheads.com/logo.png" />

    <!-- ================= GEO SEO ================= -->

    <meta name="geo.region" content="IN" />
    <meta name="geo.placename" content="India" />
    <meta name="language" content="English" />

    <!-- ================= GOOGLE FONTS ================= -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- ================= STRUCTURED DATA ================= -->

    <!-- Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Blackpotheads",
      "alternateName": "Black Potheads",
      "url": "https://blackpotheads.com",
      "logo": "https://blackpotheads.com/logo.png",
      "description": "Premium psychedelic streetwear brand in India",
      "sameAs": [
        "https://instagram.com/blackpotheads",
        "https://twitter.com/blackpotheads"
      ]
    }
    </script>

    <!-- Website -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Blackpotheads",
      "url": "https://blackpotheads.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://blackpotheads.com/shop?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ================= SEO END ================= -->

  </head>

  <body>
    <div id="root"></div>

    <!-- React App -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
